<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Sharma - Elite Cybersecurity Expert</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Teko:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 30%, #16213e 70%, #0f0f23 100%);
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Matrix Rain Canvas */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.08;
        }

        /* 3D Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .navbar.scrolled {
            padding: 0.5rem 5%;
            box-shadow: 0 25px 60px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(30px);
            transform: translateY(-8px);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00d4ff, #ff0080, #00ff88, #ffaa00);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoGlow 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.7);
        }

        @keyframes logoGlow {
            0%, 100% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.4s ease;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, #00d4ff, #ff0080);
            border-radius: 25px;
            transform: scaleX(0);
            transition: transform 0.4s ease;
            z-index: -1;
        }

        .nav-links a:hover::before {
            transform: scaleX(1);
        }

        .nav-links a:hover {
            color: #000;
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .hero-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0,212,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255,0,128,0.4) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0,255,136,0.4) 0%, transparent 40%);
            animation: heroBgRotate 25s linear infinite;
        }

        @keyframes heroBgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hero-content {
            text-align: center;
            z-index: 3;
            max-width: 900px;
        }

        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #00d4ff, #ff0080, #00ff88, #ffaa00, #00d4ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease-in-out infinite, heroFloat 8s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(0,212,255,0.8);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes heroFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-25px) rotateX(5deg); }
        }

        .hero-subtitle {
            font-size: clamp(1.3rem, 4vw, 2rem);
            margin-bottom: 2rem;
            opacity: 0.95;
            animation: fadeInUp 1.2s ease 0.6s both;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .stat-item {
            animation: fadeInUp 1.2s ease 1s both;
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            color: #00d4ff;
            display: block;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1.2rem 3rem;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: white;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 35px rgba(0,212,255,0.4);
            position: relative;
            overflow: hidden;
        }

        .cta-button.secondary {
            background: transparent;
            border: 2px solid #00d4ff;
        }

        .cta-button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 50px rgba(0,212,255,0.6);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sections */
        section {
            padding: 120px 5%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 6vw, 4rem);
            text-align: center;
            margin-bottom: 5rem;
            background: linear-gradient(45deg, #00d4ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #ff0080);
            border-radius: 2px;
        }

        /* About Section */
        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .about-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem 2rem;
            border-radius: 20px;
            transition: all 0.5s ease;
            transform-style: preserve-3d;
        }

        .about-card:hover {
            transform: translateY(-20px) rotateX(5deg);
            box-shadow: 0 30px 60px rgba(0,212,255,0.3);
        }

        .about-card i {
            font-size: 3.5rem;
            background: linear-gradient(45deg, #00d4ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        /* Skills Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 4rem;
        }

        .skill-category h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #00d4ff;
            text-align: center;
        }

        .skill-bar {
            margin-bottom: 2rem;
        }

        .skill-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .skill-progress {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #ff0080);
            border-radius: 6px;
            width: 0;
            transition: width 2.5s ease;
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
        }

        /* Projects Section */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2.5rem;
        }

        .project-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.5s ease;
            transform-style: preserve-3d;
        }

        .project-card:hover {
            transform: translateY(-15px) rotateX(10deg);
            box-shadow: 0 40px 80px rgba(0,212,255,0.4);
        }

        .project-image {
            height: 250px;
            background: linear-gradient(45deg, #00d4ff, #ff0080);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .project-image i {
            font-size: 4rem;
            color: white;
        }

        .project-content {
            padding: 2rem;
        }

        .project-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: #00d4ff;
        }

        .project-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .tag {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Certifications */
        .certifications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .cert-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .cert-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,212,255,0.3);
        }

        .cert-icon {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 1rem;
        }

        /* Contact Section */
        .contact {
            background: rgba(0,0,0,0.4);
            border-radius: 25px;
            padding: 5rem;
            text-align: center;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 2.5rem;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 600;
        }

        .contact-link:hover {
            background: linear-gradient(45deg, #00d4ff, #ff0080);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,212,255,0.4);
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(0,212,255,0.6);
            border-radius: 50%;
            animation: float 25s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-stats { gap: 2rem; }
            .cta-buttons { flex-direction: column; align-items: center; }
            section { padding: 80px 5%; }
        }

        /* Scroll Animations */
        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Matrix Background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="logo">RAHUL SEC</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#certs">Certifications</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section
