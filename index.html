<!DOCTYPE html>
<html>
<head>
    <title>Rahul | Cybersecurity Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #05070d;
            color: white;
            scroll-behavior: smooth;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            position: fixed;
            width: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: #aaa;
            margin-left: 20px;
            text-decoration: none;
        }

        nav a:hover {
            color: cyan;
        }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
        }

        .hero-text h1 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .hero-text p {
            color: #aaa;
            max-width: 400px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 20px;
            background: cyan;
            border: none;
            color: black;
            cursor: pointer;
        }

        .btn:hover {
            box-shadow: 0 0 20px cyan;
        }

        .hero img {
            width: 350px;
        }

        /* PROJECT SECTION */
        .projects {
            padding: 80px;
        }

        .projects h2 {
            text-align: center;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        /* ADD PROJECT */
        .add-box {
            margin-top: 50px;
        }

        input, textarea {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #111;
            border: 1px solid #333;
            color: white;
        }

        button.add {
            margin-top: 10px;
            padding: 10px;
            background: cyan;
            border: none;
            color: black;
        }

        /* ANIMATION */
        .fade {
            opacity: 0;
            transform: translateY(40px);
            transition: 1s;
        }

        .fade.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

<nav>
    <div>Rahul</div>
    <div>
        <a href="#">Home</a>
        <a href="#projects">Projects</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-text fade">
        <h1>Cybersecurity Developer</h1>
        <p>Designing secure systems and futuristic interfaces for real-world challenges.</p>
        <button class="btn" onclick="scrollToProjects()">View Projects</button>
    </div>

    <img src="https://i.imgur.com/8Km9tLL.png" class="fade">
</section>

<!-- PROJECTS -->
<section class="projects" id="projects">
    <h2>My Projects</h2>

    <div id="projectList"></div>

    <div class="add-box">
        <h3>Add Project</h3>
        <input id="title" placeholder="Title">
        <textarea id="desc" placeholder="Description"></textarea>
        <input id="img" placeholder="Image URL">
        <button class="add" onclick="addProject()">Add</button>
    </div>
</section>

<script>
function scrollToProjects() {
    document.getElementById("projects").scrollIntoView();
}

/* ANIMATION */
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    faders.forEach(el => {
        let top = el.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
            el.classList.add('show');
        }
    });
});

/* PROJECT SYSTEM */
let projects = JSON.parse(localStorage.getItem("projects")) || [];

function displayProjects() {
    let container = document.getElementById("projectList");
    container.innerHTML = "";

    projects.forEach(p => {
        let card = document.createElement("div");
        card.className = "card";

        let content = "<h3>" + p.title + "</h3><p>" + p.desc + "</p>";

        if (p.img) content += "<img src='" + p.img + "' width='100%'>";

        card.innerHTML = content;
        container.appendChild(card);
    });
}

function addProject() {
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let img = document.getElementById("img").value;

    projects.push({title, desc, img});
    localStorage.setItem("projects", JSON.stringify(projects));

    displayProjects();
}

displayProjects();
</script>

</body>
</html>
