<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Sharma - Elite Cybersecurity Expert</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Teko:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 30%, #16213e 70%, #0f0f23 100%);
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Matrix Rain Effect */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.1;
        }

        /* 3D Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .navbar.scrolled {
            padding: 0.5rem 5%;
            box-shadow: 0 25px 60px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(30px);
            transform: translateY(-8px);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00d4ff, #ff0080, #00ff88, #ffaa00);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoGlow 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.7);
        }

        @keyframes logoGlow {
            0%, 100% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; filter: hue-rotate(180deg); }
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.4s ease;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, #00d4ff, #ff0080);
            border-radius: 25px;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.4s ease;
            z-index: -1;
        }

        .nav-links a:hover::before {
            transform: scaleX(1);
        }

        .nav-links a:hover {
            color: #000;
            transform: translateY(-2px);
        }

        /* Hero Section - Enhanced 3D */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .hero-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0,212,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255,0,128,0.4) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0,255,136,0.4) 0%, transparent 40%),
                radial-gradient(circle at 60% 60%, rgba(255,170,0,0.3) 0%, transparent 40%);
            animation: heroBgRotate 25s linear infinite;
        }

        @keyframes heroBgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hero-content {
            text-align: center;
            z-index: 3;
            position: relative;
            max-width: 800px;
        }

        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #00d4ff, #ff0080, #00ff88, #ffaa00, #00d4ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite, heroFloat 8s ease-in-out infinite;
            text-shadow: 
                0 0 20px rgba(0,212,255,0.8),
                0 0 40px rgba(255,0,128,0.6),
                0 0 60px rgba(0,255,136,0.4);
            perspective: 1000px;
        }

        @keyframes heroFloat {
            0%, 100% { 
                transform: translateY(0px) rotateX(0deg) rotateY(0deg) scale(1); 
            }
            25% { 
                transform: translateY(-25px) rotateX(8deg) rotateY(8deg) scale(1.02); 
            }
            50% { 
                transform: translateY(-15px) rotateX(-5deg) rotateY(-5deg) scale(1.01); 
            }
            75% { 
                transform: translateY(-30px) rotateX(5deg) rotateY(5deg) scale(1.03); 
            }
        }

        .hero-subtitle {
            font-size: clamp(1.3rem, 4vw, 2rem);
            margin-bottom: 2.5rem;
            opacity: 0.95;
            font-weight: 400;
            animation: fadeInUp 1.2s ease 0.6s both;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            animation: fadeInUp 1.2s ease 1s both;
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: #00d4ff;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1.2rem 3rem;
            background: linear-gradient(45deg, rgba(0,212,255,0.2), rgba(255,0,128,0.2));
            backdrop-filter: blur(20px);
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border: 2px solid rgba(0,212,255,0.5);
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 35px rgba(0,212,255,0.3);
        }

        .cta-button.primary {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            border-color: #00d4ff;
        }

        .cta-button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 50px rgba(0,212,255,0.5);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        /* Sections */
        section {
            padding: 120px 5%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 6vw, 4rem);
            text-align: center;
            margin-bottom: 5rem;
            background: linear-gradient(45deg, #00d4ff, #ff0080, #00ff88);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00d4ff, #ff0080, transparent);
            border-radius: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* About Section - Enhanced 3D Cards */
        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-top: 4rem;
        }

        .about-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 3rem 2.5rem;
            border-radius: 25px;
            position: relative;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            overflow: hidden;
        }

        .about-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #ff0080, #00ff88);
            transform: scaleX(0);
            transition: transform 0.6s ease;
        }

        .about-card:hover::before {
            transform: scaleX(1);
        }

        .about-card:hover {
            transform: translateY(-25px) rotateX(8deg) rotateY(8deg) scale(1.02);
            box-shadow: 
                0 35px 70px rgba(0,212,255,0.4),
                0 0 40px rgba(255,0,128,0.3);
            border-color: rgba(0,212,255,0.5);
        }

        .about-card i {
            font-size: 3.5rem;
            background: linear-gradient(45deg, #00d4ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            display: block;
        }

        .about-card h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: #00d4ff;
        }

        /* Skills Section - Advanced 3D Progress */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 4rem;
        }

        .skill-category {
            margin-bottom: 4rem;
        }

        .skill-category h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            margin-bottom: 2.5rem;
            color: #00d4ff;
            text-align: center;
            position: relative;
        }

        .skill-category h3::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #ff0080);
        }

        .skill-bar {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .skill-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .skill-progress {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #ff0080, #00ff88);
            border-radius: 10px;
            width: 0;
            transition: width 3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            box-shadow: 0 0 25px rgba(0,212,255,0.6);
        }

        .skill-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shine 2.5s infinite;
        }

        /* Projects Section - Enhanced 3D Cards */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 3rem;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            overflow: hidden;
            position: relative;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }

        .project-card:hover {
            transform: translateY(-20px) rotateX(12deg) rotateY(8deg) scale(1.03);
            box-shadow: 
                0 50px 100px rgba(0,212,255,0.5),
                0 0 60px rgba(255,0,128,0.4);
            border-color: rgba(0,212,255,0.6);
        }

        .project-image {
            height: 280px;
            background: linear-gradient(45deg, #1a1a2e, #16213e);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-image i {
            font-size: 4rem;
            color: rgba(0,212,255,0.8);
            animation: pulseIcon 2s infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .project-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3
