<!DOCTYPE html>
<html>
<head>
    <title>Rahul | Cyber Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: radial-gradient(circle at top, #0a0f1f, #000);
        }

        /* CYBER GRID BACKGROUND */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* NAVBAR */
        nav {
            padding: 20px 60px;
            background: rgba(0,0,0,0.6);
        }

        /* PROJECT SECTION */
        .projects {
            max-width: 900px;
            margin: auto;
            padding: 80px 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        h3 {
            margin-top: 30px;
        }

        input, textarea {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        button.add {
            margin-top: 15px;
            padding: 10px 18px;
            background: cyan;
            border: none;
            color: black;
            cursor: pointer;
            border-radius: 5px;
        }

        button.add:hover {
            box-shadow: 0 0 10px cyan;
        }

        /* PROJECT CARDS */
        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid rgba(0,255,255,0.2);
        }

        .card img {
            margin-top: 10px;
            width: 100%;
            border-radius: 8px;
        }

    </style>
</head>

<body>

<nav>
    Rahul
</nav>

<section class="projects">

    <h2>Projects</h2>

    <div id="projectList"></div>

    <h3>Add Project</h3>

    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="img" placeholder="Image URL">

    <button class="add" onclick="addProject()">Add</button>

</section>

<script>
let projects = JSON.parse(localStorage.getItem("projects")) || [];

function displayProjects() {
    let container = document.getElementById("projectList");
    container.innerHTML = "";

    projects.forEach(p => {
        let card = document.createElement("div");
        card.className = "card";

        let content = "<h3>" + p.title + "</h3><p>" + p.desc + "</p>";

        if (p.img) {
            content += "<img src='" + p.img + "'>";
        }

        card.innerHTML = content;
        container.appendChild(card);
    });
}

function addProject() {
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let img = document.getElementById("img").value;

    if (!title || !desc) {
        alert("Enter title and description");
        return;
    }

    projects.push({title, desc, img});
    localStorage.setItem("projects", JSON.stringify(projects));

    displayProjects();

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("img").value = "";
}

displayProjects();
</script>

</body>
</html>
